<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test IA - Frontend</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 1.5rem;
        }
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: #fff;
            border-radius: 8px;
            resize: vertical;
            min-height: 100px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
        }
        textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
            width: 100%;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }
        .response {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #252525;
            border-radius: 8px;
            border: 1px solid #333;
            white-space: pre-wrap;
            min-height: 60px;
        }
        .placeholder {
            color: #777;
            font-style: italic;
        }
        .error {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Preguntar a la IA 🤖</h1>
        <textarea id="prompt" placeholder="Escribe tu pregunta aquí..."></textarea>
        <button id="askBtn">Enviar</button>
        <div id="response" class="response"><span class="placeholder">La respuesta aparecerá aquí...</span></div>
    </div>

    <script>
        const askBtn = document.getElementById('askBtn');
        const promptInput = document.getElementById('prompt');
        const responseDiv = document.getElementById('response');

        askBtn.addEventListener('click', async () => {
            const message = promptInput.value.trim();
            if (!message) return;

            askBtn.disabled = true;
            askBtn.textContent = 'Pensando...';
            responseDiv.innerHTML = '<span class="placeholder">Esperando respuesta...</span>';
            responseDiv.classList.remove('error');

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await res.json();
                
                if (res.ok && data.success) {
                    responseDiv.textContent = data.response;
                } else {
                    throw new Error(data.error || 'Error desconocido');
                }
            } catch (err) {
                responseDiv.textContent = '❌ Error: ' + err.message;
                responseDiv.classList.add('error');
            } finally {
                askBtn.disabled = false;
                askBtn.textContent = 'Enviar';
            }
        });
    </script>
</body>
</html>
